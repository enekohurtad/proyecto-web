    <h2>Ubicación y origen</h2> 
    <figure>
        <img src="stock-vector-mozambique-vector-map-silhouette-isolated-on-africa-map-editable-vector-map-of-africa-315915662.jpg" alt="Localizacion de Mozambique en Africa" width="400">
        <figcaption>Mozambique es un país situado en el sureste de África, junto al océano Índico. Limita con países como Tanzania, South Africa y Zimbabwe. Antes de la llegada de los europeos, la zona estaba habitada por pueblos africanos bantúes dedicados a la agricultura, la pesca y el comercio. Gracias a su costa, Mozambique tuvo contacto con comerciantes árabes desde el siglo VIII, quienes introdujeron productos, cultura y la religión islámica en varias ciudades costeras.</figcaption>
